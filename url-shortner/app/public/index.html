<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>URL Shortener</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--bg1: #0f1724;
				--bg2: #041025;
				--accent1: #8be9fd;
				--accent2: #7c4dff;
				--card: rgba(255, 255, 255, 0.04);
				--glass: rgba(255, 255, 255, 0.06);
				--muted: rgba(255, 255, 255, 0.65);
			}

			* {
				box-sizing: border-box;
			}
			html,
			body {
				height: 100%;
			}
			body {
				margin: 0;
				font-family:
					"Inter",
					system-ui,
					-apple-system,
					"Segoe UI",
					Roboto,
					"Helvetica Neue",
					Arial;
				background:
					radial-gradient(
						1200px 600px at 10% 10%,
						rgba(124, 77, 255, 0.12),
						transparent
					),
					radial-gradient(
						1000px 400px at 90% 90%,
						rgba(139, 233, 253, 0.08),
						transparent
					),
					linear-gradient(180deg, var(--bg1), var(--bg2));
				color: #e6eef8;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 40px;
			}

			.container {
				width: 100%;
				max-width: 820px;
				background: linear-gradient(
					180deg,
					rgba(255, 255, 255, 0.03),
					rgba(255, 255, 255, 0.02)
				);
				border-radius: 18px;
				padding: 36px;
				box-shadow:
					0 10px 30px rgba(2, 6, 23, 0.6),
					inset 0 1px 0 rgba(255, 255, 255, 0.02);
				position: relative;
				overflow: hidden;
				backdrop-filter: blur(6px) saturate(120%);
				transform: translateY(0);
				animation: floatIn 700ms cubic-bezier(0.2, 0.9, 0.3, 1);
			}

			@keyframes floatIn {
				from {
					opacity: 0;
					transform: translateY(12px) scale(0.995);
				}
				to {
					opacity: 1;
					transform: translateY(0) scale(1);
				}
			}

			.brand {
				display: flex;
				align-items: center;
				gap: 14px;
				margin-bottom: 6px;
			}

			.logo {
				width: 56px;
				height: 56px;
				border-radius: 12px;
				background: linear-gradient(
					135deg,
					var(--accent1),
					var(--accent2)
				);
				display: flex;
				align-items: center;
				justify-content: center;
				font-weight: 800;
				color: #042;
				box-shadow: 0 6px 18px rgba(124, 77, 255, 0.18);
			}

			h1 {
				font-size: 20px;
				margin: 0;
			}
			p.lead {
				margin: 6px 0 18px;
				color: var(--muted);
				font-size: 13px;
			}

			.form-row {
				display: flex;
				gap: 14px;
				align-items: flex-start;
			}
			.field {
				flex: 1;
				position: relative;
			}

			input#url {
				width: 100%;
				padding: 16px 16px;
				border-radius: 12px;
				border: 1px solid rgba(255, 255, 255, 0.06);
				background: linear-gradient(
					180deg,
					rgba(255, 255, 255, 0.02),
					rgba(255, 255, 255, 0.01)
				);
				color: #eaf6ff;
				font-size: 15px;
				outline: none;
				transition:
					box-shadow 0.18s ease,
					transform 0.06s ease,
					border-color 0.12s ease;
				box-shadow: 0 6px 18px rgba(2, 6, 23, 0.5);
			}

			input#url:focus {
				box-shadow: 0 10px 30px rgba(124, 77, 255, 0.12);
				border-color: rgba(139, 233, 253, 0.35);
				transform: translateY(-2px);
			}

			button {
				background: linear-gradient(
					135deg,
					var(--accent2),
					var(--accent1)
				);
				color: #051022;
				border: none;
				padding: 14px 22px;
				border-radius: 12px;
				font-weight: 700;
				cursor: pointer;
				box-shadow:
					0 8px 24px rgba(124, 77, 255, 0.16),
					inset 0 -2px 6px rgba(0, 0, 0, 0.15);
				transition:
					transform 0.15s ease,
					box-shadow 0.15s ease;
			}

			button:hover {
				transform: translateY(-4px);
				box-shadow: 0 14px 40px rgba(124, 77, 255, 0.22);
			}

			button:active {
				transform: translateY(-1px);
			}

			.hint {
				font-size: 12px;
				color: var(--muted);
				margin-top: 10px;
			}

			#result {
				margin-top: 22px;
				font-weight: 600;
				color: #bfefff;
				display: flex;
				align-items: center;
				gap: 12px;
				flex-wrap: wrap;
			}

			#result a {
				color: #e9fff9;
				text-decoration: none;
				background: linear-gradient(
					90deg,
					rgba(255, 255, 255, 0.06),
					rgba(255, 255, 255, 0.02)
				);
				padding: 8px 12px;
				border-radius: 10px;
			}

			.result-box {
				opacity: 0;
				transform: translateY(6px);
				transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
			}
			.result-box.visible {
				opacity: 1;
				transform: translateY(0);
			}

			/* subtle animated background blobs */
			.bg-blob {
				position: absolute;
				filter: blur(60px);
				opacity: 0.14;
				pointer-events: none;
			}
			.bg-blob.one {
				width: 420px;
				height: 380px;
				left: -80px;
				top: -80px;
				background: linear-gradient(135deg, #7c4dff, #4bd3ff);
			}
			.bg-blob.two {
				width: 320px;
				height: 320px;
				right: -60px;
				bottom: -90px;
				background: linear-gradient(135deg, #ff80bf, #7c4dff);
				opacity: 0.09;
			}

			@media (max-width: 640px) {
				.container {
					padding: 22px;
					margin: 12px;
					border-radius: 14px;
				}
				.brand .logo {
					width: 48px;
					height: 48px;
				}
				.form-row {
					flex-direction: column;
				}
				button {
					width: 100%;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="bg-blob one" aria-hidden></div>
			<div class="bg-blob two" aria-hidden></div>

			<div class="brand">
				<div class="logo">U</div>
				<div>
					<h1>URL Shortener</h1>
					<p class="lead">
						Beautiful, fast links — paste your long URL and press
						Shorten.
					</p>
				</div>
			</div>

			<div class="form-row">
				<div class="field">
					<input
						id="url"
						placeholder="Enter long URL"
						aria-label="Long URL"
					/>
				</div>
				<div>
					<button onclick="shorten()">Shorten</button>
				</div>
			</div>

			<div class="hint">
				No account required • Links generated instantly
			</div>

			<div id="result" aria-live="polite"></div>
		</div>

		<script>
			async function shorten() {
				const longUrl = document.getElementById("url").value;

				const res = await fetch("/shorten", {
					method: "POST",
					headers: {
						"Content-Type": "application/json",
					},
					body: JSON.stringify({
						url: longUrl,
					}),
				});

				const data = await res.json();

				// keep the logic identical to previous version; just wrap for animation
				const resultEl = document.getElementById("result");
				resultEl.innerHTML =
					"<div class='result-box'>Short URL: <a href='" +
					data.shortUrl +
					"' target='_blank'>" +
					data.shortUrl +
					"</a></div>";

				// trigger visible animation
				const box = resultEl.querySelector(".result-box");
				requestAnimationFrame(() => box.classList.add("visible"));
			}
		</script>
	</body>
</html>
